version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-sitespace}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS512}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - EXPORT_FILES_ABSOLUTE_PATH=${EXPORT_FILES_ABSOLUTE_PATH:-/app/uploads}
      - EXPORT_FILES_SERVER_PATH=${EXPORT_FILES_SERVER_PATH:-getFile}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8080}
      - DEBUG=${DEBUG:-False}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sitespace}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
