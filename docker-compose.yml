version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/sitespace
      - JWT_SECRET=Paragon$123
      - JWT_ALGORITHM=HS512
      - JWT_EXPIRATION_MS=86400000
      - SECRET_KEY=PARAGON$87654321
      - EXPORT_FILES_ABSOLUTE_PATH=/app/uploads
      - EXPORT_FILES_SERVER_PATH=getFile
      - HOST=0.0.0.0
      - PORT=8080
      - DEBUG=True
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=sitespace
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
